name: Frontend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    env:
      VITE_BACKEND_BASE_URL: http://localhost:10000/
      VITE_DISHLY_AI_ENABLED: 'false'
      CYPRESS_DISHLY_LOCALE: de

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Unit tests
        run: npm run test:unit -- --run

      - name: Build
        run: npm run build

      - name: Cypress E2E tests
        run: npm run test:e2e
